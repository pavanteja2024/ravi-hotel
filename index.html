<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Ravi Hotel | Fresh Quality Tiffin</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background-image:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
background-size:cover;
background-attachment:fixed;
}

.overlay{
background:rgba(255,255,255,0.92);
min-height:100vh;
}

header{
background:linear-gradient(135deg,#ff6600,#ff8533);
color:white;
padding:60px;
}

header h1{
font-size:42px;
margin-bottom:10px;
}

header p{
font-size:18px;
}

h2{
margin-top:40px;
font-size:28px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:35px;
padding:40px;
}

.card{
background:white;
width:260px;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
transition:0.4s;
}

.card:hover img{
transform:scale(1.08);
}

.card h3{
margin:10px 0 5px 0;
}

.price{
color:#ff6600;
font-weight:bold;
font-size:20px;
margin-bottom:15px;
}

.order{
background:#25D366;
color:white;
padding:14px 30px;
border:none;
border-radius:8px;
font-size:18px;
margin:25px;
cursor:pointer;
transition:0.3s;
}

.order:hover{
background:#1ebe5d;
transform:scale(1.05);
}

footer{
background:#222;
color:white;
padding:30px;
margin-top:40px;
}

footer p{
line-height:1.6;
}

</style>

</head>

<body>

<div class="overlay">

<header>

<h1>Ravi Hotel</h1>

<p>Fresh Quality Tiffin</p>

<p>Delivery available only in Madhira</p>

</header>

<div class="menu">

<img src="idli.jpg">

</div>

</div>

<div class="card">

</div>

<div class="card">
<img src="onion-dosa.jpg">
<h3>Onion Dosa</h3>
<p class="price">₹40</p>
</div>

<div class="card">
<img src="bonda.jpg">
<h3>Bonda (10 pcs)</h3>
<p class="price">₹30</p>
</div>

</div>

</html>
